<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="ParkSmart - Ứng dụng gửi xe thông minh dành cho tài xế">
    <title>ParkSmart - Gửi Xe Thông Minh</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23ea580c'/%3E%3Cpath d='M22 50V14h13c8 0 13 5 13 12s-5 12-13 12h-5v12h-8Zm8-20h5c3 0 5-2 5-4s-2-4-5-4h-5v8Z' fill='%23fff'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=layout-full-width-2">
</head>
<body>

<div id="login-page" class="login-page">
    <div class="login-bg-animation">
        <div class="login-bg-shape shape-1"></div>
        <div class="login-bg-shape shape-2"></div>
        <div class="login-bg-shape shape-3"></div>
    </div>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <svg width="48" height="48" viewBox="0 0 64 64"><rect width="64" height="64" rx="16" fill="#ea580c"/><path d="M22 50V14h13c8 0 13 5 13 12s-5 12-13 12h-5v12h-8Zm8-20h5c3 0 5-2 5-4s-2-4-5-4h-5v8Z" fill="#fff"/></svg>
                </div>
                <h1 class="login-title">ParkSmart</h1>
                <p class="login-subtitle">Đăng nhập tài khoản Tài xế</p>
            </div>
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <div class="input-icon-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        <input type="email" id="login-email" placeholder="VD: phuc@gmail.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="login-password">Mật khẩu</label>
                    <div class="input-icon-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                        <input type="password" id="login-password" placeholder="Nhập mật khẩu" required>
                        <button type="button" id="toggle-password" class="toggle-password-btn" aria-label="Hiện mật khẩu">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div id="login-error" class="login-error hidden"></div>
                <button type="submit" id="login-btn" class="login-submit-btn">
                    <span>Đăng nhập</span>
                    <div class="btn-loader hidden"></div>
                </button>
            </form>
            <div class="login-footer">
                <p>Chưa có tài khoản? <a href="#" id="go-register">Đăng ký ngay</a></p>
            </div>
        </div>
    </div>
</div>

<div id="register-page" class="login-page hidden">
    <div class="login-bg-animation">
        <div class="login-bg-shape shape-1"></div>
        <div class="login-bg-shape shape-2"></div>
    </div>
    <div class="login-container">
        <div class="register-card">
            <div class="login-header">
                <div class="login-logo">
                    <svg width="40" height="40" viewBox="0 0 64 64"><rect width="64" height="64" rx="16" fill="#ea580c"/><path d="M22 50V14h13c8 0 13 5 13 12s-5 12-13 12h-5v12h-8Zm8-20h5c3 0 5-2 5-4s-2-4-5-4h-5v8Z" fill="#fff"/></svg>
                </div>
                <h1 class="login-title" style="font-size:1.6rem">Tạo tài khoản</h1>
                <p class="login-subtitle">Đăng ký để sử dụng dịch vụ gửi xe</p>
            </div>
            <form id="register-form" class="login-form">
                <div class="form-group">
                    <label for="reg-name">Họ và tên *</label>
                    <input type="text" id="reg-name" placeholder="Nguyễn Văn A" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email *</label>
                    <input type="email" id="reg-email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label for="reg-phone">Số điện thoại *</label>
                    <input type="tel" id="reg-phone" placeholder="0912 345 678" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Mật khẩu *</label>
                    <input type="password" id="reg-password" placeholder="Ít nhất 6 ký tự" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="reg-confirm">Xác nhận mật khẩu *</label>
                    <input type="password" id="reg-confirm" placeholder="Nhập lại mật khẩu" required>
                </div>
                <div id="register-error" class="login-error hidden"></div>
                <button type="submit" class="login-submit-btn"><span>Đăng ký</span></button>
            </form>
            <div class="login-footer">
                <p>Đã có tài khoản? <a href="#" id="go-login">Đăng nhập</a></p>
            </div>
        </div>
    </div>
</div>

<div id="app" class="app hidden">
    <header class="app-header">
        <div class="header-top">
            <div class="header-brand">
                <svg width="32" height="32" viewBox="0 0 64 64"><rect width="64" height="64" rx="16" fill="#fff"/><path d="M22 50V14h13c8 0 13 5 13 12s-5 12-13 12h-5v12h-8Zm8-20h5c3 0 5-2 5-4s-2-4-5-4h-5v8Z" fill="#ea580c"/></svg>
                <span class="header-brand-name">ParkSmart</span>
            </div>
            <div class="header-actions" style="position:relative">
                <div id="header-avatar" style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;cursor:pointer" onclick="document.getElementById('user-dropdown').classList.toggle('hidden')">A</div>
                <div id="user-dropdown" class="user-dropdown hidden">
                    <button class="user-dropdown-item" onclick="App.navigate('account');document.getElementById('user-dropdown').classList.add('hidden')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Tài khoản
                    </button>
                    <div class="user-dropdown-divider"></div>
                    <button class="user-dropdown-item danger" onclick="App.logout()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg> Đăng xuất
                    </button>
                </div>
            </div>
        </div>
        <p class="header-greeting">Xin chào, <strong id="header-user-name">Tài xế</strong></p>
    </header>

    <main class="app-main">
        <div id="page-content"></div>
    </main>

    <nav class="bottom-nav">
        <button class="bottom-nav-item active" data-page="home" onclick="App.navigate('home')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Trang chủ</span>
        </button>
        <button class="bottom-nav-item" data-page="parking" onclick="App.navigate('parking')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span>Bãi xe</span>
        </button>
        <button class="bottom-nav-item" data-page="reservations" onclick="App.navigate('reservations')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            <span>Đặt chỗ</span>
        </button>
        <button class="bottom-nav-item" data-page="vehicles" onclick="App.navigate('vehicles')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 16H9m10 0h3v-3.15a1 1 0 00-.84-.99L16 11l-2.7-3.6a1 1 0 00-.8-.4H5.24a2 2 0 00-1.8 1.1l-.8 1.63A6 6 0 002 12.42V16h2"/><circle cx="6.5" cy="16.5" r="2.5"/><circle cx="16.5" cy="16.5" r="2.5"/></svg>
            <span>Xe của tôi</span>
        </button>
        <button class="bottom-nav-item" data-page="account" onclick="App.navigate('account')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Tài khoản</span>
        </button>
    </nav>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="js/api.js"></script>
<script src="js/pages.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
