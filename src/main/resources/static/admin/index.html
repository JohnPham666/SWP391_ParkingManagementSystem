<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hệ thống quản lý bãi đỗ xe thông minh - Quản trị viên" />
    <title>ParkSmart - Admin System</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230f172a'/%3E%3Cpath d='M22 50V14h13c8 0 13 5 13 12s-5 12-13 12h-5v12h-8Zm8-20h5c3 0 5-2 5-4s-2-4-5-4h-5v8Z' fill='%2338bdf8'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <!-- LOGIN PAGE (ONE REACT TEMPLATE) -->
    <div id="login-page" class="auth-page">
        <div class="widget-auth">
            <h3 style="font-size: 40px; margin-top: 0; margin-bottom: 8px; font-weight: 600; color: #ea580c;">ParkSmart</h3>
            <p class="widget-auth-info">Welcome Back! Please login to your account</p>
            
            <form id="login-form" class="mt-4">
                <div class="form-group" style="margin-bottom: 16px;">
                    <label style="font-size: 14px; font-weight: 600; margin-bottom: 8px; display: block;">Email</label>
                    <input type="email" id="login-email" class="form-control" placeholder="Enter your email" required />
                </div>
                
                <div class="form-group" style="margin-bottom: 16px;">
                    <label style="font-size: 14px; font-weight: 600; margin-bottom: 8px; display: block;">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="login-password" class="form-control" placeholder="Enter your password" required />
                        <button type="button" id="toggle-password" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #666;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>

                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; font-size: 13px;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: #464646;">
                        <input type="checkbox" style="width: auto;" /> Remember me
                    </label>
                </div>

                <div id="login-error" class="login-error hidden"></div>

                <button type="submit" id="login-btn" class="auth-btn" style="width: 100%; background: #ffc107; color: #212529; padding: 10px; border-radius: 6px; font-weight: 600; border: none; margin-bottom: 16px; transition: 0.2s;">
                    <span>Login</span>
                    <div class="btn-loader hidden"></div>
                </button>
            </form>
        </div>
        <img src="images/signinImg.svg" alt="signIn" class="backImg" style="position: absolute; right: 0; bottom: 0; max-height: 85%;" />
    </div>

    <!-- MAIN APP -->
    <div id="app" class="app hidden">
        <!-- SIDEBAR -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg width="32" height="32" viewBox="0 0 64 64"><rect width="64" height="64" rx="16" fill="#ffffff"/><path d="M22 50V14h13c8 0 13 5 13 12s-5 12-13 12h-5v12h-8Zm8-20h5c3 0 5-2 5-4s-2-4-5-4h-5v8Z" fill="#ea580c"/></svg>
                    <span class="sidebar-brand">ParkSmart</span>
                </div>
                <button id="sidebar-toggle" class="sidebar-toggle-btn" aria-label="Thu gọn sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="users" id="nav-users">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
                    <span>Quản lý Tài Khoản</span>
                </a>
                <a href="#" class="nav-item" data-page="settings" id="nav-settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    <span>Cấu hình (Settings)</span>
                </a>
                <a href="#" class="nav-item" data-page="logs" id="nav-logs">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
                    <span>System Logs</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="user-avatar" id="user-avatar">A</div>
                    <div class="user-info">
                        <p class="user-name" id="sidebar-user-name">Admin</p>
                        <p class="user-role" id="sidebar-user-role">Admin</p>
                    </div>
                </div>
                <button id="logout-btn" class="logout-btn" title="Đăng xuất">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                </button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <div class="main-wrapper">
            <!-- TOP BAR -->
            <header class="topbar">
                <div class="topbar-left">
                    <button id="mobile-menu-btn" class="mobile-menu-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                    </button>
                    <h2 id="page-title" class="page-title">Dashboard</h2>
                </div>
                <div class="topbar-right">
                    <div class="topbar-clock" id="topbar-clock"></div>
                </div>
            </header>

            <!-- PAGE CONTENT -->
            <main id="page-content" class="page-content">
                <!-- Dashboard page loaded by JS -->
            </main>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script type="module" src="js/app.js?v=5"></script>
</body>
</html>
