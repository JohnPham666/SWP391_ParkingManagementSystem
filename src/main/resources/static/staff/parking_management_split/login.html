<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập | Hệ Thống Bãi Đỗ Xe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#f97316', dark: '#0f172a' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    
    <div class="max-w-md w-full bg-white rounded-[24px] shadow-xl border border-slate-100 p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-orange-100 text-primary rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="car" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">SmartPark System</h1>
            <p class="text-slate-500 font-medium mt-2">Đăng nhập cổng nhân viên / quản lý</p>
        </div>

        <form id="loginForm">
            <div class="space-y-5">
                <div>
                    <label class="block text-[13px] font-bold text-slate-600 uppercase tracking-wide mb-2">Email</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input type="email" id="email" value="teststaff@parking.vn" required class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3.5 text-slate-800 font-semibold focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all" placeholder="Nhập email...">
                    </div>
                </div>

                <div>
                    <label class="block text-[13px] font-bold text-slate-600 uppercase tracking-wide mb-2">Mật Khẩu</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input type="password" id="password" value="123456" required class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3.5 text-slate-800 font-semibold focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all" placeholder="Nhập mật khẩu...">
                    </div>
                </div>
            </div>

            <div id="error-msg" class="text-red-500 text-sm font-semibold mt-4 hidden text-center"></div>

            <button type="submit" id="submitBtn" class="w-full mt-8 bg-gradient-to-r from-primary to-orange-600 hover:to-orange-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg hover:shadow-xl hover:-translate-y-0.5 flex items-center justify-center">
                Đăng Nhập
            </button>
        </form>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.getElementById('submitBtn');

            errorMsg.classList.add('hidden');
            submitBtn.innerHTML = '<i data-lucide="loader" class="w-5 h-5 animate-spin mr-2"></i> Đang xử lý...';
            submitBtn.disabled = true;
            lucide.createIcons();

            try {
                const response = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });

                const data = await response.json();
                if (data.success) {
                    // Check if role is allowed for staff portal
                    const role = data.data.role;
                    if (role !== 'Admin' && role !== 'ParkingManager' && role !== 'ParkingStaff') {
                        errorMsg.textContent = 'Tài khoản không có quyền truy cập Staff Portal';
                        errorMsg.classList.remove('hidden');
                        submitBtn.innerHTML = 'Đăng Nhập';
                        submitBtn.disabled = false;
                        return;
                    }
                    localStorage.setItem('jwtToken', data.data.token);
                    localStorage.setItem('userData', JSON.stringify(data.data));
                    window.location.href = 'index.html';
                } else {
                    errorMsg.textContent = data.message || 'Đăng nhập thất bại';
                    errorMsg.classList.remove('hidden');
                    submitBtn.innerHTML = 'Đăng Nhập';
                    submitBtn.disabled = false;
                }
            } catch (error) {
                errorMsg.textContent = 'Không thể kết nối đến máy chủ Backend';
                errorMsg.classList.remove('hidden');
                submitBtn.innerHTML = 'Đăng Nhập';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
